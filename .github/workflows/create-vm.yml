name: Try to Create OCI VM

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

env:
  COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
  IMAGE_ID: "ocid1.image.oc1.phx.aaaaaaaavukymfigv3gbia4nglaotp2uqr5sc7dt5cbvjcjps4vgmrhxiv2q"
  SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
  AD_NAME: "KoIS:PHX-AD-3"
  OCI_CLI_REGION: "us-phoenix-1"
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-oci-cli-v1

      - name: Add OCI CLI to path
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup OCI CLI and Keep Trying
        id: create_vm
        continue-on-error: true
        run: |
          set -o pipefail
          export SUPPRESS_LABEL_WARNING=True
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=True

          pip install -q oci-cli

          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_CLI_USER }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_CLI_TENANCY }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "region=${{ env.OCI_CLI_REGION }}" >> ~/.oci/config
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /home/runner/my_ssh_key.pub

          # Keep retrying inside a single run (up to ~30 min)
          END=$((SECONDS+1800))
          ATTEMPT=0
          while [ $SECONDS -lt $END ]; do
            ATTEMPT=$((ATTEMPT+1))
            echo ""
            echo "=== Attempt $ATTEMPT ($(date -u)) ==="
            
            OCI_OUTPUT=$(oci compute instance launch \
              --compartment-id "$COMPARTMENT_ID" \
              --availability-domain "$AD_NAME" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus":4,"memoryInGBs":24}' \
              --subnet-id "$SUBNET_ID" \
              --image-id "$IMAGE_ID" \
              --ssh-authorized-keys-file "/home/runner/my_ssh_key.pub" \
              --assign-public-ip true \
              --display-name "coolify-vm" \
              --boot-volume-size-in-gbs 100 2>&1 || true)

            echo "=== OCI OUTPUT ==="
            echo "$OCI_OUTPUT"
            echo "=== END OCI OUTPUT ==="

            if echo "$OCI_OUTPUT" | grep -q '"lifecycle-state": "PROVISIONING"'; then
              echo "SUCCESS! VM created!"
              echo "log_data<<EOF" >> $GITHUB_OUTPUT
              echo "$OCI_OUTPUT" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            if echo "$OCI_OUTPUT" | grep -q 'timed out'; then
              echo "Connection timeout, retrying in 10s..."
              sleep 10
            else
              echo "Out of capacity or other error, retrying in 60s..."
              sleep 60
            fi
          done

          echo "Reached time limit. Will retry on next workflow run."
          echo "log_data<<EOF" >> $GITHUB_OUTPUT
          echo "timeout" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit 1
